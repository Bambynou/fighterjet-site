<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Bonus – Vidéos YouTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Police Black Ops One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Black Ops One", sans-serif;
            background: #f2f5f8;
            color: #333;
            line-height: 1.7;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #1d3557;
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
        }

        .navbar span {
            font-size: 2rem;
            color: white;
            cursor: pointer;
            margin-right: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: #0b1b30;
            color: white;
            padding-top: 60px;
            transition: left 0.3s ease;
            z-index: 999;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px 20px 20px;
        }

        h1 {
            color: #1d3557;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .video-box {
            margin-bottom: 40px;
        }

        iframe {
            width: 100%;
            height: 315px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>

<body>

    <!-- BARRE MENU -->
    <div class="navbar">
        <span id="menuBtn">☰</span>
        <a href="page_principale.html">Menu</a>
    </div>

    <div class="sidebar" id="sidebar">
    <a id="retour" href="#">Revenir au classement</a>
    <a href="apropos.html?from=bonus">À propos</a>
    <a href="https://fr.wikipedia.org/wiki/Avion_de_chasse" target="_blank">Wikipédia</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");
    const retour = document.getElementById("retour");

    if (from === "main") {
        retour.href = "page_principale.html";
    } else if (from === "page2") {
        retour.href = "page2/page-2.html";
    } else {
        retour.href = "page_principale.html"; // fallback
    }
</script>





    <div class="container">

        <h1>Bonus – Vidéos YouTube</h1>
        <p style="font-size:1.2rem;">Voici quelques vidéos sélectionnées pour vous. Tu peux en ajouter autant que tu veux.</p>

        <!-- VIDEO 1 -->
        <div class="video-box">
            <h2 style="color:#1d3557;">Vidéo 1</h2>
            <iframe src="https://youtu.be/gW4uZVK9hWU" allowfullscreen></iframe>
        </div>

        <!-- VIDEO 2 -->
        <div class="video-box">
            <h2 style="color:#1d3557;">Vidéo 2</h2>
            <iframe src="https://youtu.be/acoTgXcW8fg" allowfullscreen></iframe>
        </div>

        <!-- VIDEO 3 -->
        <div class="video-box">
            <h2 style="color:#1d3557;">Vidéo 3</h2>
            <iframe src="https://youtu.be/pODdJUqyUGg" allowfullscreen></iframe>
        </div>

        <p style="text-align:center; margin-top:40px;">
            <a href="page_principale.html" style="font-size:1.4rem; color:#1d3557; text-decoration:none;">⬅ Retour au début du classement</a>
        </p>

    </div>

    <script>
        // MENU
        document.getElementById("menuBtn").onclick = () => {
            document.getElementById("sidebar").classList.toggle("open");
        };
    </script>

</body>
</html>
